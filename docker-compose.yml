services:
  mirage-server:
    image: mirage-server
    container_name: mirage-server
    environment:
      - WORKING_DIRECTORY=/app
    ports:
      - 5000:5000
    volumes:
      - ${DRIVE_LOCATION}:/app/DRIVE
      - ./container/backup/:/app/backup
      - ./container/logs/:/app/logs
    restart: unless-stopped
